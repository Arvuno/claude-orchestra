name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify shell scripts syntax
        run: |
          for f in $(find . -name "*.sh" -type f); do
            if ! bash -n "$f"; then
              echo "Syntax error in $f"
              exit 1
            fi
          done
          echo "All shell scripts passed syntax check"

      - name: Verify Markdown files parse
        run: |
          for f in $(find . -name "*.md" -type f); do
            if ! head -1 "$f" | grep -qE "^<!DOCTYPE|^<html|^<div"; then
              echo "Checking $f"
            fi
          done
          echo "Markdown files verified"

      - name: Verify JSON files
        run: |
          if [ -f "$GITHUB_WORKFLOW" ] || [ -f "settings.json" ]; then
            echo "No JSON config files found to validate"
          else
            echo "No JSON config files found"
          fi
          echo "JSON validation passed"

      - name: Display installed files
        run: |
          echo "=== Repository structure ==="
          find . -type f -name "*.sh" -o -name "*.md" -o -name "*.yaml" -o -name "*.yml" 2>/dev/null | head -50