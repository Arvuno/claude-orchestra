<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16181d"/><stop offset="1" stop-color="#0b0c0e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5b301"/><stop offset="1" stop-color="#ffd45e"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7a818c"/>
    </marker>
    <marker id="arrowg" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f5b301"/>
    </marker>
  </defs>

  <rect width="1200" height="680" fill="url(#bg)"/>

  <!-- title -->
  <text x="60" y="64" font-size="30" font-weight="800" fill="#fff">How <tspan fill="url(#gold)">Claude Orchestra</tspan> routes every request</text>
  <text x="60" y="96" font-size="17" fill="#8b919c">A hook reads each prompt → the router picks the orchestra → it announces what fired.</text>

  <!-- request -->
  <rect x="60" y="300" width="150" height="64" rx="12" fill="#1f2229" stroke="#343a44"/>
  <text x="135" y="330" font-size="16" font-weight="600" fill="#dfe3ea" text-anchor="middle">Your</text>
  <text x="135" y="350" font-size="16" font-weight="600" fill="#dfe3ea" text-anchor="middle">request</text>

  <!-- hook -->
  <rect x="262" y="300" width="160" height="64" rx="12" fill="#1f2229" stroke="#343a44"/>
  <text x="342" y="326" font-size="15" font-weight="700" fill="#fff" text-anchor="middle">Routing hook</text>
  <text x="342" y="348" font-size="12.5" fill="#8b919c" text-anchor="middle">fires every prompt</text>

  <!-- router -->
  <rect x="474" y="296" width="176" height="72" rx="14" fill="#2d2d2d" stroke="#f5b301" stroke-width="2"/>
  <text x="562" y="324" font-size="15.5" font-weight="700" fill="#fff" text-anchor="middle">orchestra-router</text>
  <text x="562" y="346" font-size="12.5" fill="#cbd0d8" text-anchor="middle">matches intent</text>

  <!-- NEXUS -->
  <rect x="474" y="150" width="176" height="62" rx="14" fill="url(#gold)"/>
  <text x="562" y="178" font-size="15.5" font-weight="800" fill="#1a1a1a" text-anchor="middle">✦ NEXUS</text>
  <text x="562" y="198" font-size="12.5" font-weight="600" fill="#1a1a1a" text-anchor="middle">meta-conductor</text>

  <!-- orchestra cards -->
  <g>
    <rect x="760" y="120" width="250" height="52" rx="11" fill="#1b1f26" stroke="#343a44"/>
    <text x="780" y="152" font-size="16" fill="#dfe3ea">🔨 <tspan font-weight="700" fill="#fff">BUILD</tspan> · architect</text>

    <rect x="760" y="184" width="250" height="52" rx="11" fill="#1b1f26" stroke="#343a44"/>
    <text x="780" y="216" font-size="16" fill="#dfe3ea">🎨 <tspan font-weight="700" fill="#fff">DESIGN</tspan> · ux-architect</text>

    <rect x="760" y="248" width="250" height="52" rx="11" fill="#1b1f26" stroke="#343a44"/>
    <text x="780" y="280" font-size="16" fill="#dfe3ea">🔬 <tspan font-weight="700" fill="#fff">RESEARCH</tspan> · researcher</text>

    <rect x="760" y="312" width="250" height="52" rx="11" fill="#1b1f26" stroke="#343a44"/>
    <text x="780" y="344" font-size="16" fill="#dfe3ea">📣 <tspan font-weight="700" fill="#fff">MARKETING</tspan> · strategist</text>

    <rect x="760" y="376" width="250" height="52" rx="11" fill="#1b1f26" stroke="#343a44" stroke-dasharray="4 4"/>
    <text x="885" y="408" font-size="15" fill="#8b919c" text-anchor="middle">…16 more orchestras</text>
  </g>

  <!-- arrows -->
  <g stroke="#7a818c" stroke-width="2" fill="none">
    <line x1="212" y1="332" x2="258" y2="332" marker-end="url(#arrow)"/>
    <line x1="424" y1="332" x2="470" y2="332" marker-end="url(#arrow)"/>
  </g>
  <!-- NEXUS dashed to router -->
  <line x1="562" y1="214" x2="562" y2="292" stroke="#f5b301" stroke-width="2" stroke-dasharray="5 5" marker-end="url(#arrowg)"/>
  <text x="576" y="258" font-size="12" fill="#f5b301" font-style="italic">sequences</text>
  <!-- router to cards -->
  <g stroke="#7a818c" stroke-width="2" fill="none">
    <path d="M650 320 C710 300, 710 146, 758 146" marker-end="url(#arrow)"/>
    <path d="M650 326 C710 312, 712 210, 758 210" marker-end="url(#arrow)"/>
    <path d="M650 332 L758 332" marker-end="url(#arrow)"/>
    <path d="M650 338 C710 352, 712 274, 758 274" marker-end="url(#arrow)"/>
    <path d="M650 344 C710 372, 712 402, 758 402" marker-end="url(#arrow)"/>
  </g>

  <!-- announcement bar -->
  <rect x="60" y="520" width="950" height="74" rx="14" fill="#10241a" stroke="#1b9e4b" stroke-width="2"/>
  <text x="84" y="554" font-size="18" font-weight="700" fill="#3ddc84">🎼 BUILD active</text>
  <text x="84" y="580" font-size="15" fill="#aeb6c2" font-family="ui-monospace, Menlo, monospace">Conductor: architect  ·  Using: code-reviewer, debugger, tdd-guide</text>
  <path d="M885 410 C885 470, 480 470, 360 516" stroke="#1b9e4b" stroke-width="2" fill="none" stroke-dasharray="5 5" marker-end="url(#arrow)"/>
  <text x="640" y="486" font-size="12.5" fill="#1b9e4b" font-style="italic" text-anchor="middle">conductor sequences its players → announces</text>
</svg>
