<svg width="1280" height="360" viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16181d"/>
      <stop offset="0.55" stop-color="#0e0f12"/>
      <stop offset="1" stop-color="#080809"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5b301"/>
      <stop offset="1" stop-color="#ffd45e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5b301" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f5b301" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#bg)"/>
  <ellipse cx="980" cy="180" rx="420" ry="260" fill="url(#glow)"/>

  <!-- conductor network: central podium node radiating to 20 orchestra nodes -->
  <g stroke="url(#gold)" stroke-width="1.1" opacity="0.55">
    <line x1="980" y1="180" x2="1080" y2="70"/>
    <line x1="980" y1="180" x2="1160" y2="120"/>
    <line x1="980" y1="180" x2="1200" y2="200"/>
    <line x1="980" y1="180" x2="1150" y2="280"/>
    <line x1="980" y1="180" x2="1060" y2="310"/>
    <line x1="980" y1="180" x2="900" y2="300"/>
    <line x1="980" y1="180" x2="850" y2="240"/>
    <line x1="980" y1="180" x2="840" y2="140"/>
    <line x1="980" y1="180" x2="900" y2="70"/>
    <line x1="980" y1="180" x2="1020" y2="120"/>
    <line x1="980" y1="180" x2="1110" y2="180"/>
    <line x1="980" y1="180" x2="1080" y2="250"/>
  </g>
  <g fill="#0e0f12" stroke="url(#gold)" stroke-width="2">
    <circle cx="1080" cy="70" r="9"/>
    <circle cx="1160" cy="120" r="7"/>
    <circle cx="1200" cy="200" r="8"/>
    <circle cx="1150" cy="280" r="7"/>
    <circle cx="1060" cy="310" r="9"/>
    <circle cx="900" cy="300" r="7"/>
    <circle cx="850" cy="240" r="8"/>
    <circle cx="840" cy="140" r="7"/>
    <circle cx="900" cy="70" r="8"/>
    <circle cx="1020" cy="120" r="6"/>
    <circle cx="1110" cy="180" r="6"/>
    <circle cx="1080" cy="250" r="7"/>
  </g>
  <!-- central podium / conductor -->
  <circle cx="980" cy="180" r="26" fill="url(#gold)"/>
  <text x="980" y="192" font-size="26" text-anchor="middle">🎼</text>

  <!-- title block -->
  <text x="90" y="150" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-1">Claude <tspan fill="url(#gold)">Orchestra</tspan></text>
  <text x="92" y="200" font-size="24" font-weight="500" fill="#aab0bb">An operating system for your Claude Code</text>
  <text x="92" y="234" font-size="24" font-weight="500" fill="#aab0bb">skills, agents &amp; MCPs.</text>

  <!-- footer chips -->
  <g font-size="15" font-weight="600">
    <rect x="90" y="276" width="118" height="30" rx="15" fill="#1f2228" stroke="#2c3038"/>
    <text x="149" y="296" text-anchor="middle" fill="#f5b301">20 orchestras</text>
    <rect x="218" y="276" width="138" height="30" rx="15" fill="#1f2228" stroke="#2c3038"/>
    <text x="287" y="296" text-anchor="middle" fill="#dfe3ea">auto-routing</text>
    <rect x="366" y="276" width="92" height="30" rx="15" fill="#1f2228" stroke="#2c3038"/>
    <text x="412" y="296" text-anchor="middle" fill="#dfe3ea">MIT</text>
  </g>
</svg>
